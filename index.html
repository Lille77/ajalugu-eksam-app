:root {

*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:1000px;margin:auto;padding:16px}
.card{background:var(--card);padding:16px;border-radius:16px;margin-bottom:14px;border:1px solid var(--border);box-shadow:0 4px 14px rgba(0,0,0,.05)}

.small{color:var(--muted);font-size:14px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.stat{background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:12px}
button,select{padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;background:#fff;cursor:pointer}
.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.answer{display:block;width:100%;text-align:left;padding:12px;border-radius:10px;border:1px solid #d1d5db;background:#fff;cursor:pointer}
.answer.selected{outline:2px solid var(--primary);border-color:var(--primary)}
.answer.good{background:var(--good)}
.answer.bad{background:var(--bad)}
.answer.missed{background:var(--warn)}
.answers{display:grid;gap:8px;margin-top:12px}
.hidden{display:none}
.pill{display:inline-block;background:#eef2ff;color:#3730a3;padding:7px 10px;border-radius:999px;font-size:13px;font-weight:bold}
.flash-front{font-size:22px;font-weight:bold;margin-bottom:12px}
.flash-back{font-size:18px;line-height:1.5}
</style>
</head>

const metaEl = document.getElementById('meta');
const flashEl = document.getElementById('flash');
const quizEl = document.getElementById('quiz');
const resultEl = document.getElementById('result');

const flashCounterEl = document.getElementById('flashCounter');
const flashFrontEl = document.getElementById('flashFront');
const flashBackEl = document.getElementById('flashBack');
const flipEl = document.getElementById('flip');
const knowEl = document.getElementById('know');
const dontKnowEl = document.getElementById('dontKnow');
const flashNextEl = document.getElementById('flashNext');

const counterEl = document.getElementById('counter');
const kindEl = document.getElementById('kind');
const scoreLiveEl = document.getElementById('scoreLive');
const timerEl = document.getElementById('timer');
const questionEl = document.getElementById('question');
const hintEl = document.getElementById('hint');
const answersEl = document.getElementById('answers');
const explanationEl = document.getElementById('explanation');
const checkEl = document.getElementById('check');
const nextEl = document.getElementById('next');
const finishEl = document.getElementById('finish');

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function fmt(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
function setTopics() {
  const topics = ['Kõik', ...new Set(BANK.map(q => q.topic))];
  topics.forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    topicEl.appendChild(o);
  });
}
function getData() {
  const topic = topicEl.value;
  let pool = topic === 'Kõik' ? BANK : BANK.filter(q => q.topic === topic);
  if (modeEl.value === 'exam') return shuffle(pool).slice(0, Math.min(40, pool.length));
  if (modeEl.value === 'wrongonly') {
    const wrongSet = new Set(wrongIds);
    return shuffle(pool.filter(q => wrongSet.has(q.id)));
  }
  return shuffle(pool);
}
function markWrong(id) {
  if (!wrongIds.includes(id)) {
    wrongIds.push(id);
    localStorage.setItem('history_wrong_ids_curated', JSON.stringify(wrongIds));
  }
}
function unmarkWrong(id) {
  wrongIds = wrongIds.filter(x => x !== id);
  localStorage.setItem('history_wrong_ids_curated', JSON.stringify(wrongIds));
}
function arraysEqual(a,b) {
  if (a.length !== b.length) return false;
  const sa=[...a].sort((x,y)=>x-y), sb=[...b].sort((x,y)=>x-y);
  return sa.every((v,i)=>v===sb[i]);
}

function startApp() {
  clearInterval(timerId);
  current = getData();
  idx = 0; score = 0; selected = new Set(); checked = false;
  resultEl.classList.add('hidden');
  flashEl.classList.add('hidden');
  quizEl.classList.add('hidden');
  metaEl.textContent = current.length + ' küsimust';
  if (!current.length) {
    resultEl.classList.remove('hidden');
    resultEl.innerHTML = '<p>Siin pole veel küsimusi.</p>';
    return;
  }
  if (modeEl.value === 'flash') {
    flashEl.classList.remove('hidden');
    renderFlash();
  } else {
    quizEl.classList.remove('hidden');
    if (modeEl.value === 'exam') {
      timeLeft = 40*60;
      timerEl.textContent = 'Aeg: ' + fmt(timeLeft);
      timerId = setInterval(() => {
        timeLeft--;
        timerEl.textContent = 'Aeg: ' + fmt(timeLeft);
        if (timeLeft <= 0) finishQuiz();
      }, 1000);
    } else {
      timerEl.textContent = 'Aeg: —';
    }
    renderQuiz();
  }
}

function renderFlash() {
  const q = current[idx];
  flashCounterEl.textContent = (idx+1) + '/' + current.length;
  flashFrontEl.textContent = q.question;
  flashBackEl.textContent = q.answers.join('; ');
  flashBackEl.classList.add('hidden');
}
flipEl.onclick = () => flashBackEl.classList.toggle('hidden');
knowEl.onclick = () => unmarkWrong(current[idx].id);
dontKnowEl.onclick = () => markWrong(current[idx].id);
flashNextEl.onclick = () => { idx = (idx+1)%current.length; renderFlash(); };

function renderQuiz() {
  const q = current[idx];
  selected = new Set();
  checked = false;
  counterEl.textContent = (idx+1) + '/' + current.length;
  kindEl.textContent = q.kind === 'multi' ? 'Mitu õiget vastust' : 'Üks õige vastus';
  scoreLiveEl.textContent = modeEl.value === 'exam' ? ('Punktid: ' + score) : '';
  questionEl.textContent = q.question;
  hintEl.textContent = q.kind === 'multi' ? 'Vali kõik õiged vastused ja vajuta Kontrolli.' : 'Vali üks vastus.';
  answersEl.innerHTML = '';
  explanationEl.textContent = '';
  nextEl.classList.add('hidden');
  finishEl.classList.add('hidden');
  checkEl.classList.toggle('hidden', q.kind !== 'multi');

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer';
    btn.textContent = String.fromCharCode(65+i) + '. ' + opt;
    btn.onclick = () => handleSelect(i, btn);
    answersEl.appendChild(btn);
  });
}
function handleSelect(i, btn) {
  if (checked) return;
  const q = current[idx];
  if (q.kind === 'single') {
    selected = new Set([i]);
    gradeSingle();
  } else {
    if (selected.has(i)) {
      selected.delete(i);
      btn.classList.remove('selected');
    } else {
      selected.add(i);
      btn.classList.add('selected');
    }
  }
}
function afterGrade(ok, text) {
  if (ok) {
    score++;
    unmarkWrong(current[idx].id);
  } else {
    markWrong(current[idx].id);
  }
  explanationEl.textContent = text;
  checked = true;
  if (idx < current.length - 1) nextEl.classList.remove('hidden');
  else finishEl.classList.remove('hidden');
}
function gradeSingle() {
  const q = current[idx];
  const choice = [...selected][0];
  const correct = q.correct[0];
  [...answersEl.children].forEach((b,i) => {
    if (i === correct) b.classList.add('good');
    if (i === choice && i !== correct) b.classList.add('bad');
  });
  afterGrade(choice === correct, 'Õige vastus: ' + q.answers.join('; '));
}
function gradeMulti() {
  const q = current[idx];
  const chosen = [...selected];
  [...answersEl.children].forEach((b,i) => {
    const isCorrect = q.correct.includes(i);
    const wasChosen = selected.has(i);
    if (isCorrect && wasChosen) b.classList.add('good');
    if (!isCorrect && wasChosen) b.classList.add('bad');
    if (isCorrect && !wasChosen) b.classList.add('missed');
  });
  afterGrade(arraysEqual(chosen, q.correct), 'Õiged vastused: ' + q.answers.join('; '));
}
function finishQuiz() {
  clearInterval(timerId);
  const percent = current.length ? Math.round((score / current.length) * 100) : 0;
  resultEl.classList.remove('hidden');
  resultEl.innerHTML = '<h3 style="margin-top:0">Tulemus</h3><p><strong>' + score + '/' + current.length + '</strong> (' + percent + '%)</p>';
}
checkEl.onclick = gradeMulti;
nextEl.onclick = () => { idx++; if (idx < current.length) renderQuiz(); };
finishEl.onclick = finishQuiz;
startEl.onclick = startApp;
setTopics();
metaEl.textContent = BANK.length + ' küsimust valmis';
</script>
</body>
</html>
