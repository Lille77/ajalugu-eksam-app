<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ajaloo flashcardid</title>
  <style>
    :root {
      --bg: #f6f3ee;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #64748b;
      --accent: #5b50e6;
      --accent2: #e9e6ff;
      --border: #ddd7cf;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #fbfaf7 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 22px 16px 34px; }
    header { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 18px; }
    h1 { margin: 0 0 4px; font-size: clamp(1.5rem, 3vw, 2.3rem); letter-spacing: -0.03em; }
    .sub { color: var(--muted); font-size: 0.98rem; }
    .stats { text-align: right; color: var(--muted); font-size: 0.95rem; white-space: nowrap; }
    .toolbar { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; margin: 14px 0 18px; }
    input, button { border: 1px solid var(--border); border-radius: 14px; padding: 11px 13px; font-size: 1rem; background: white; color: var(--text); }
    button { cursor: pointer; font-weight: 650; transition: transform .08s ease, background .15s ease, border .15s ease; }
    button:hover { transform: translateY(-1px); }
    .primary { background: var(--accent); color: white; border-color: var(--accent); }
    .ghost { background: white; }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 28px;
      min-height: 340px; padding: 28px; box-shadow: 0 18px 45px rgba(31, 41, 51, .08);
      display: flex; flex-direction: column; justify-content: space-between; gap: 24px;
    }
    .label { color: var(--accent); font-weight: 800; letter-spacing: .08em; font-size: .78rem; text-transform: uppercase; margin-bottom: 8px; }
    .question { font-size: clamp(1.35rem, 3vw, 2.2rem); line-height: 1.2; font-weight: 750; white-space: pre-wrap; }
    .answer {
      display: none; background: var(--accent2); border-radius: 20px; padding: 18px;
      line-height: 1.55; font-size: clamp(1.05rem, 2.2vw, 1.25rem); white-space: pre-wrap;
    }
    .answer.show { display: block; }
    .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 16px; }
    .progress { margin: 18px 0 8px; height: 10px; background: #e8e2da; border-radius: 999px; overflow: hidden; }
    .bar { height: 100%; width: 0%; background: var(--accent); transition: width .2s ease; }
    .list { margin-top: 22px; display: none; background: white; border: 1px solid var(--border); border-radius: 22px; overflow: hidden; }
    .list.show { display: block; }
    .row { display: grid; grid-template-columns: 42px 1fr 1.2fr; gap: 10px; padding: 12px; border-bottom: 1px solid #eee8df; font-size: .94rem; line-height: 1.35; }
    .row:last-child { border-bottom: 0; }
    .num { color: var(--muted); font-weight: 700; }
    .small { color: var(--muted); font-size: .9rem; margin-top: 8px; }
    @media (max-width: 720px) {
      header { display: block; }
      .stats { text-align: left; margin-top: 8px; }
      .toolbar { grid-template-columns: 1fr; }
      .controls { grid-template-columns: 1fr 1fr; }
      .row { grid-template-columns: 36px 1fr; }
      .row div:nth-child(3) { grid-column: 2; }
    }
  </style>
</head>

    <section class="list" id="list"></section>

te tugipunkte Prantsusmaa rannikul; Oluline teise maailmasõja lahing, mille tulemusel avati Prantsusmaal nn teine rinne ja algas sakslaste poolt okupeeritud alade vabastamine"}, {"q": "Kuidas mõjutas Normandia dessant Saksamaa olukorda teises maailmasõjas?", "a": "Avati uus, nn teine rinne, mistõttu pidid sakslased tõmbama osa vägesid Venemaalt välja; Normandia dessandi järel hakkasid sakslased kiirelt kaotama oma kontrolli Prantsusmaa põhjaosa üle; Mitmel rindel võitlemine nõrgestas Saksamaa relvajõude ja Saksamaa kapituleerus vähem kui aastaga."}, {"q": "Nimeta üks tagajärg, mille teise maailmasõja kaotamine Saksamaale kaasa tõi.", "a": "Saksamaa kaotas ajutiselt iseseisvuse ja jagati neljaks okupatsioonitsooniks; Saksamaa lõhenes kaheks riigiks (Saksa Liitvabariik ja Saksa Demokraatlik Vabariik); Saksamaa pidi hüvitama sõjaga tekitatud ainelised ja moraalsed kahjud (nt maksma kompensatsiooni juutidele jm);"}, {"q": "Milliste sõjakahjudega seisid Euroopa riigid silmitsi peale teise maailmasõja lõppu?", "a": "Palju linnasid ja asulaid olid purustatud; Infrastruktuur oli tugevasti kannatada saanud; Miljonid inimesed olid sõjas elu kaotanud või vigastada saanud; Euroopas oli miljoneid sõjapõgenikke"}, {"q": "Kuidas mõjutas teine maailmasõda naiste rolli ja kohta ühiskonnas sõjajärgsel perioodil?", "a": "Naiste tööhõive paranes; Naiste positsioon ühiskonnas tugevnes"}, {"q": "Millist sündmust peetakse külma sõja alguseks?", "a": "Berliini blokaadi"}, {"q": "MIllised märksõnad iseloomustavad külma sõja perioodi", "a": "Trumani doktriin; Kahepooluseline maailm; Võidurelvastumine; Raudne eesriie"}, {"q": "Nimeta Korea sõja tulemus", "a": "Hukkus ligi 3 miljonit inimest; Riik jäi jagatud kaheks"}, {"q": "Nimeta Suessi kriisi tulemus", "a": "Suessi kanal läks Egiptuse valdusesse; Suurbritannia ja Prantsusmaa rahvusvaheline positsioon nõrgenes; Nõukogude Liit tugevdas suhteid araabia riikidega"}, {"q": "Nimeta Kuuba kriisi tulemus", "a": "Maailm jõudis tuumasõja lävele; NL nõustus raketid ära viima kui USA eemaldab oma baasid NL lähedalt; USA tunnustas Kuuba puutumatust; pärast kriisi USA ja NL suhted paranesid veidi"}, {"q": "Nimeta Vietnami sõja tulemus", "a": "USA'l ei õnnestunud sõda võita; Lõuna-Vietnam langes kommunistide võimu alla"}, {"q": "Miks oli (ja on) poliitikutele kasulik omada kontrolli kinokunsti üle?", "a": "Võimaldab edastada oma sõnumeid suurele hulgale inimestele ja mõjutada nende meelsust"}, {"q": "Mille poolest erines 1930. aastate USA filmitööstus natsionaalsotsialistliku Saksamaa filmitööstusest.", "a": "Hollywood ei olnud riigi ja poliitikute kontrolli all; Hollywoodis ei olnud tsensuuri ja filme sai vabalt avaldada; Hollywood ei edastanud süstemaatiliselt propagandistlikke sõnumeid; Hollywoodis oli rohkem andekaid ja säravaid filmikunstnikke"}, {"q": "1950.–1960. aastatel algas Nõukogude Liidu ja USA vahel ulatuslikum võistlus kosmose pärast. Milline oli NL saavutus?", "a": "Esimese satelliidi orbiidile lennutamine; Esimese elusolendi orbiidile lennutamine; Esimese inimese orbiidile lennutamine"}, {"q": "1950.–1960. aastatel algas Nõukogude Liidu ja USA vahel ulatuslikum võistlus kosmose pärast. Milline oli USA saavutus?", "a": "Esimese inimese viimine Kuule"}, {"q": "Mis aastatel toimus Vabadussõda?", "a": "1918-1920"}, {"q": "Nimeta soomusrongide eelis", "a": "Soomusrongid olid varustatud suurtükkide ja kuulipildujatega; Nendega sai kiiresti transportida sõdureid ja varustust; Rongi vagunid olid soomustatud, pakkudes meeskonnale kuulide eest kaitset"}, {"q": "Nimeta soomusrongide puudus", "a": "Rongide n-ö soomuse moodustas vaid liiv ja seetõttu oli nende kaitsevõime piiratud; Rongide tegutsemisulatus oli piiratud, sest nad said liikuda ainult mööda raudteid; Raudteid oli lihtne kahjustada ja rongide liikumist piirata; Rongidel olnud relvastuse hulk, laskmisulatus ja suund olid piiratud"}, {"q": "Miks teise maailmasõja aastatel rändasid inimesed Eestist välja?", "a": "Inimesed põgenesid Nõukogude okupatsiooni ja repressioonide eest; Inimesed põgenesid sõjategevuse eest; Baltisakslased lahkusid Hitleri kutsel;"}, {"q": "Mis muutis Eesti NSV sisserändajatele atraktiivseks sihtkohaks?", "a": "Eestis oli teistest liiduvabariikidest kõrgem elatustase; Eestis oli tööjõudefitsiit ehk siin oli kerge tööd leida"}, {"q": "Miks oli Nõukogude võimule kasulik, et Eestisse koliks võimalikult palju inimesi teistest liiduvabariikidest?", "a": "Nõrgendada eestlaste rahvuslikku identiteedi ja elanikkonna toetust iseseisvale rahvusriigile; Venekeelse elanikkonna suurendamine aitas vähendada eesti keele ja kultuuri mõju; Sisserändajad olid Nõukogude Liidule ustavamad kui eestlased; Eestis ei olnud piisavalt töölisi ja spetsialiste kaevandustesse ja tehastesse"}, {"q": "Aastatel 1946–1988 rändas Eestisse palju inimesi Nõukogude Liidust. Miks ei tulnud siia inimesi teistest riikidest?", "a": "Liikumine Nõukogude Liidu, sh Eesti, ja lääneriikide vahel oli piiratud; Teiste riikide kodanikel oli raske saada Eestisse sissesõidu- ja elamisluba; Raudne eesriie takistas inimeste vaba liikumist;"}, {"q": "Mis võis ajendada eestlasi Eesti piires elukohta vahetama nõukogude ajal?", "a": "Uues kaevandused ja tehased, kus oli võimalik saada tasuvat tööd; Riik võis sundida\ninimest elukohta vahetama (tööle suunamine); Talumajapidamiste likvideerimise ja sundkollektiviseerimise tulemusel pagesid või asusid inimesed ümber linna"}, {"q": "Millist riiki esindasid Eestis elavad maletajad ja teised sportlased aastail 1944–1991?", "a": "Nõukogude Liitu"}, {"q": "Mis on reform?", "a": "Reformi eesmärk on parandada olemasolevat süsteemi; Reform on sihipärane ja järkjärguline muudatus; Reform viiakse läbi riigis olemasolevate institutsioonide poolt"}, {"q": "Mis on revolutsioon?", "a": "Revolutsiooni eesmärk on olemasolev süsteem lammutada; Revolutsioon on reeglina väga kiire ja totaalne muutus; revolutsioon viiakse läbi tavaliselt rahva poolt või kaasabil"}, {"q": "Kas perestroika näol oli tegu reformi või revolutsiooniga?", "a": "Reformiga"}, {"q": "Perestroika mõju Eestile", "a": "Aitas Eestis käivitada iseseisvuse taastamise protsessi; Eestis sai hakata vähehaaval uuesti tegelema väikeettevõtlusega; Perestroika osaks olnud glasnosti tulemusel vähenes tsensuur"}, {"q": "Nimeta üks Laulva revolutsiooni perioodil rahvahulki kaasa haaranud sündmus", "a": "Balti kett; öölaulupead; Eestimaa Laul"}, {"q": "20. sajandil aset leidnud Eesti siseriiklik reform", "a": "Maareform; Rahareform; Omandireform"}, {"q": "Millist valitsemisvormi natsionaalsotsialistlik partei Saksamaal võimul olles rakendas?", "a": "Totalitarismi"}, {"q": "Miks tekkis teise maailmasõja järel kaks Saksamaad?", "a": "Saksamaad kontrollinud lääneriigid ja Nõukogude Liit ei jõudnud Saksamaa tuleviku osas kokkuleppele; Külma sõja puhkemine takistas okupatsioonitsoonideks jagatud Saksamaa taasühinemist; Nõukogude Liit soovis kindlustada oma mõju Punaarmee poolt teise maailmasõja lõpus hõivatud aladel, sh Ida-Saksamaal"}, {"q": "Mis nime all tuntakse pakti, mis neutraliseeris Saksamaa jaoks ohu idas?", "a": "Molotovi-Ribbentropi pakt (MRP)"}, {"q": "Millised kokkulepped MR pakti sisus tagasid Saksamaale ja Nõukogude Liidule julguse rünnata Poolat?", "a": "Lubadus teineteist kümne aasta jooksul mitte rünnata; Lubadus mitte osaleda teisele poolele vaenulikus sõjalises liidus; Salaprotokoll, mille alusel jaotati Ida-Euroopa omavahel huvisfäärideks"}, {"q": "Mis viis Poola kiire kapituleerumiseni?", "a": "Väga pikk piir, mida oli peaaegu võimatu rünnakute eest kaitsta; Poola jäi kahe tule vahele, kui läänest ründas Saksamaa ja idast Nõukogude Liit; Poola piirati võõrvägede poolt sisse; Saksamaa oli Poolast relvastuselt (tugev õhuvägi ja tankid) ning taktikaliselt (välksõda) üle; Poola jäi võitluses üksi, sest ei saanud oma liitlastelt sõjalist toetust"}, {"q": "Mis sündmus toimus enna Poola vallutamist? Atlandi harta; Müncheni kokkulepe; Austria anšluss; Baaside leping; Juuniküüditamine;", "a": "Müncheni kokkulepe; Austria anšluss"}, {"q": "Mis sündmus toimus pärast Poola vallutamist? Atlandi harta; Müncheni kokkulepe; Austria anšluss; Baaside leping; Juuniküüditamine;", "a": "Atlandi harta; Juuniküüditamine; Baaside leping"}, {"q": "Teise maailmasõja võtmesündmused", "a": "Pearl Harbor; Aatompommid; Normandia dessant; Holokaust; Stalingradi lahing"}, {"q": "Miks nimetatakse USA ja Nõukogude Liidu konflikti külmaks sõjaks?", "a": "See ei kujunenud kunagi otseseks relvastatud nn „kuumaks“ kokkupõrkeks kahe suurriigi vahel"}, {"q": "Millist sündmust loetakse külma sõja alguseks?", "a": "Trumani doktriini väljakuulutamist; Berliini blokaadi"}, {"q": "Põhjus, mis viis Nõukogude impeeriumi kokkuvarisemiseni", "a": "Pikaajalised majandusraskused; Okupeeritud alade ja rahvaste soov iseseisvuda; Totalitaarse kommunistliku korra jätkusuutmatus"}, {"q": "Kuidas nimetatakse mõttelist ja füüsilist piiri, mis eraldas Nõukogude Liidu ja selle mõju all olnud riigid ülejäänud Euroopast, piirates nii inimeste kui ka teabe vaba liikumist?", "a": "Raudne eesriie"}, {"q": "Demokraatia", "a": "Valitsemisvorm, kus võim kuulub rahvale. Selle põhimõtted hõlmavad rahva osalust otsustes, vabade ja õigete valimiste korraldamist, sõna- ja ajakirjandusvabadust, õigusriigi põhimõtteid ning võimude lahusust (seadusandlik, täidesaatev ja kohtuvõim)."}, {"q": "Diktatuur", "a": "Valitsemisvorm, kus kogu võim on koondunud ühe isiku või kitsa grupi (nt partei, sõjaväe või eliidi) kätte ning rahval puudub reaalne poliitiline mõju. Piiratakse kodanike õigusi ja vabadusi, sealhulgas sõna-, ajakirjandus- ja kogunemisvabadust."}, {"q": "Glasnost", "a": "Nõukogude Liidu juhi Mihhail Gorbatšovi algatatud reformipoliitika osa 1980. aastate teisel poolel. Eesmärk oli suurendada ühiskonna avatust, lubada vabamat ajakirjandust ja vähendada tsensuuri."}, {"q": "Perestroika", "a": "Mihhail Gorbatšovi algatatud reformiprogramm Nõukogude Liidus 1980. aastate teisel poolel, mille eesmärk oli majanduse ja poliitilise süsteemi ümberkorraldamine ja liberaliseeerimine (ettevõtete suurem iseseisvus, erasektori arendamine)."}, {"q": "Parlamentarism", "a": "Valitsemisvorm, kus seadusandlik võim kuulub parlamendile ja valitsus sõltub parlamendi toetusest. Parlamentarismi iseloomustab võimude lahusus, kus täidesaatev võim (valitsus) vastutab parlamendi ees ning võib selle usaldushääletuse kaotuse korral tagasi astuda."}, {"q": "Autoritaarne", "a": "Võimule pimesi alistumist nõudev"}, {"q": "Autoritaarne diktatuur", "a": "Autoritaarne diktatuur on valitsemisvorm, kus kogu võim on koondunud ühe isiku või kitsa eliidi kätte, ilma demokraatliku kontrolli ja rahva osaluseta poliitikas. Piiratud kodanike õigused, opositsioon maha surutud ning meedia ja ühiskondlik elu allutatud riigi kontrollile. (K.Päts Eestis 1934-1940)"}, {"q": "Balti kett", "a": "Baltimaade rahvarinnete korraldatud suur protestiaktsioon 23.august 1989.a (MRP 50.aastapäev) katkematu inimkett (2 milj. in) Tallinnast Vilniusesse, mille eesmärgiks oli demonstreerida maailmale baltimaade vabadustahet."}, {"q": "Demokraatia", "a": "Valitsemisvorm, kus võim kuulub rahvale. Seda iseloomustavad vabad valimised, õigusriik, sõnavabadus ja mitmeparteisüsteem. Rahvas osaleb riigi juhtimises kas otse või valitud esindajate kaudu."}, {"q": "Desarmeerimine", "a": "Sõjalise relvastuse vähendamine või kaotamine"}, {"q": "Diktatuur", "a": "Valitsemisvorm, kus kogu võim on koondunud ühe isiku või väikese grupi kätte, kes valitsevad ilma rahva valimise või demokraatlike protsessideta."}, {"q": "Diskrimineerimine", "a": "Ebavõrdse kohtlemise rakendamist teatud isikute või rühmade suhtes nende soo, vanuse, rassi, rahvuse, usutunnistuse, seksuaalse orientatsiooni, puude või muu eripära alusel."}, {"q": "Dissident", "a": "Teisitimõleja, vastupanu liikumise osaleja"}, {"q": "Euroopa Liit", "a": "EL on majanduslik ja poliitiline liit, mis ühendab 27 Euroopa riiki eesmärgiga edendada majanduslikku koostööd, poliitilist ühtsust ja turvalisust."}, {"q": "Genotsiid", "a": "Inimeste massiline hävitamine rassilistel, rahvuslikel, usulistel vm tunnustel. See võib hõlmata tapmisi, küüditamisi, türanniat, kultuurilise ja usulise identiteedi hävitamist, orjusesse langetamist või muid tekitatud kannatusi."}, {"q": "Globaalprobleemid", "a": "ülemaailmsed probleemid - kliima, vaesus ja ebavõrdsus, loodusvarade vähenemine, rahutused ja konfliktid, globaalne tervishoid."}, {"q": "Heaoluühiskond", "a": "Ühiskond, kus riik tagab oma kodanike heaolu, pakkudes neile sotsiaalseid teenuseid ja kaitset, et rahuldada nende põhivajadusi. See hõlmab haridust, tervishoidu, sotsiaalkindlustust, eluaset ja töövõimalusi, et tagada kõigile inimestele elatustase ja elukvaliteet."}, {"q": "Idaplokk", "a": "NSV Liit, tema sõltlasriigid ja kommunistlikud liitlased nt Poolat, Tšehhoslovakkiat, Ungarit, Rumeeniat, Bulgaaria, Ida-Saksamaad, Eestit, Lätit, Leedut."}, {"q": "Ideoloogia", "a": "Poliitiline õpetus - kogum ideid, uskumusi ja väärtusi, mis kujundavad inimeste mõtteviisi, tegevust ja poliitikat."}, {"q": "Industrialiseerimine", "a": "Suurtööstuse eelisarendamine - tehaste rajamist, tehnoloogia ja masinate kasutuselevõttu"}, {"q": "Inflatsioon", "a": "Raha väärtuse langus, hindade tõus"}, {"q": "Infoühiskond", "a": "Ühiskond, kus info ja teadmine on peamine majanduslik ressurss. Selle iseloomustuseks on tehnoloogia ja interneti laialdane kasutamine, samuti kiire teabevahetus, mis mõjutab kõiki eluvaldkondi, sealhulgas töö, hariduse ja meelelahutuse valdkonda."}, {"q": "Isikukultus", "a": "Liidri, enamastiriigipea tõstmine teistest kõrgemale; tema arvele kirjutatakse riigi või partei kõik saavutused, kuid mitte ebaõnnestumised. (Stalin, Hitler)"}, {"q": "Kapitalism", "a": "Majandussüsteem, kus tootmisvahendid on eraomandis ja eesmärk on kasumi teenimine, põhinedes turumajandusel. Tootmisotsuseid juhivad turg ja konkurents."}, {"q": "Kolhoos", "a": "Põllumajandusettevõte, milles tootmisvahendid on kolhoosi liikmete ühisomand."}, {"q": "Kollektiviseerimine", "a": "Talude vägivaldne ühendamine ühismajanditeks ehk kolhoosideks."}, {"q": "Kolmas Maailm", "a": "Külma sõja ajal riigid, mis ei kuulunud Lääne (kapitalistlikud riigid) ega Ida (sotsialistlikud riigid) blokkidesse."}, {"q": "Kommunism", "a": "Poliitiline õpetus, mia püüb saavutada sotsiaalset võrdsust proletariaadi diktatuuri kehtestamise abil ja mille eesmärgiks on klassie ja eraomandita ühiskond. (looja Karl Marx)"}, {"q": "Konservatism", "a": "Poliitiline ja sotsiaalne ideoloogia, mis rõhutab traditsioonide, stabiilsuse ja mugavuste hoidmist ühiskonnas."}, {"q": "Kriis", "a": "Riikide konflikt, mis võib viia sõjani."}, {"q": "Külm sõda", "a": "(1947–1991) oli poliitiline ja ideoloogiline vastasseis USA ja NSV Liidu vahel, kus osapooled ei olnud otseselt sõjas, kuid konflikti lahendati peamiselt vahendite kaudu nagu diplomaatia, sõjaline ähvardus, spioonide tegevuse, propaganda, võidurelvastumine ja globaalne mõjuvõimu konkurents."}, {"q": "Laulev revolutsioon", "a": "Poeetiline ühisnimetus aastatel 1988-1991 Eestis toimunud rahvuslikele massimeeleavaldustele, kus tähtsal kohal oli isamaaliste laulude ühislaulmine."}, {"q": "Liberalism", "a": "Maailmavaade ja poliitiline õpetus, mis rõhutab üksikisiku vabadust ja vastutust."}, {"q": "Integratsioon", "a": "Protsess, mille käigus erinevad osad liituvad või ühinevad üheks tervikuks. Seda mõistet kasutatakse sageli ühiskonna, majanduse või poliitika kontekstis, et viidata erinevate kultuuride, riikide või gruppide ühendamisele ja koostööle."}, {"q": "Marshalli plaan", "a": "Ameerika Ühendriikide algatatud abiprogramm, mille eesmärk oli Euroopa riikide taastamine pärast teist maailmasõda. 1948. aastal käivitatud plaan pakkus majandusabi ja laene Euroopa riikidele, et aidata neil taastada oma majandused ja vältida kommunismi levikut. Plaani nimi tuleneb USA välisministrist George Marshallist, kes selle välja töötas."}, {"q": "Massihävitusrelvad", "a": "Relvad, mille eesmärk on tekitada ulatuslikku hävingut ja surma suurtes inimrühmades või suurtel aladel. Need jagunevad tuumarelvadeks, keemilisteks ja bioloogilisteks relvadeks"}, {"q": "Massikultuur", "a": "Kultuuri vorm, mis on suunatud laiemale rahvale ja mille tarbimine toimub sageli meedia ja tehnoloogia kaudu. See hõlmab muusikat, filmide, televisioonisaateid, moodide ja meelelahutuse erinevaid vorme, mis on kergesti ligipääsetavad ja tarbitavad suurte inimgruppide poolt."}, {"q": "Metsavennad", "a": "Eestis, Lätis ja Leedus teise maailmasõja ajal ja pärast seda metsades varjul olnud relvastatud vastupanugrupid, kes võitlesid Nõukogude okupatsiooni vastu. Metsavennad ei tunnistanud Nõukogude Liidu valitsust ja kaitsesid oma iseseisvust, sageli teostades saboteerimisakte, rünnakuid ja vabadusvõitlust."}, {"q": "NATO", "a": "Põhja-Atlandi Lepingu Organisatsioon on kaitseallianss - loodi 1949 a. lääneriikide sõjaline ja poliitiline ühendus."}, {"q": "Natsionaliseerimine", "a": "Riigistamine - protsess, kus riik võtab kontrolli eraomanduses olevate ettevõtete või ressursside üle, muutes need riigi omandiks."}, {"q": "Nomenklatuur", "a": "parteiline ametnikkond"}, {"q": "Okupatsioon", "a": "Võõra riigi või selle osa ajutine hõivamine teise riigi relvajõududega."}, {"q": "Plaanimajandus", "a": "Majandussüsteem, kus riik kontrollib ja suunab tootmist, jaotamist ning tarbimist, määrates kindlaks toodetavate kaupade ja teenuste kogused."}, {"q": "Propaganda", "a": "Kihutustöö, mille eesmärgiks on panna inimesed omaks võtma mingit kindlat arvamust."}, {"q": "Rahvademokraatia", "a": "Külma sõja ajal kommuniatide ainuvõim NSV Liidu sateliitriikides, kus demokraatia oli pelgalt kulissiks."}, {"q": "Rassism", "a": "Uskumus, et inimeste erinevused, eriti füüsilised omadused nagu nahavärv, määravad nende üleolekuse või alaväärsuse teiste ees."}, {"q": "Raudne eesriie", "a": "NSV Liidu katse eraldada ennast ja oma liitlasi muust maailmast."}, {"q": "Rehabiliteerima", "a": "Inimese või organisatsiooni maine taastamist või õiguste tagastamist, eriti pärast valesti tehtud otsuseid või valesid süüdistusi."}, {"q": "Repressioon", "a": "Võimud kasutavad vägivalda, hirmutamist või piiramist, et töötada vastu vastupanule või kaitsta oma võimu."}, {"q": "Revolutsioon", "a": "Periood ühiskonna ja riigi elus, mille tulemusena vana poliitiline kord asendatakse uuega."}, {"q": "Sotsiaaldemokraatia", "a": "Ideoloogia, mis toetab ühiskondlikku võrdsust, demokraatiat ja majanduse reguleerimist, et tagada inimeste heaolu."}, {"q": "Sotsialism", "a": "Majandus- ja poliitiline süsteem, mis rõhutab ühiskondlikku omandit, majanduslikku võrdsust ja ressursside õiglast jaotamist."}, {"q": "Sovhoos", "a": "Riigi poolt juhitud põllumajanduslik ettevõte Nõukogude Liidus, kus töötajad olid riigi ametnikud ja teenisid palka, mitte ei omanud maad ega saaki. Sovhooside eesmärk oli toota toidukaupu ja muid põllumajandustooted suurel määral riigi vajaduste rahuldamiseks."}, {"q": "Sulaaeg", "a": "Stalini surmale 1953 a. järgnenud aeg, mil paljastati Stalinismi kuriteod ja lõdvendati nõukogude reziimi survet. Selle aja jooksul toimus repressioonide leevenemine, lõdvenenud tsensuur ja teatud isikliku vabaduse suurenemine"}, {"q": "Terrorism", "a": "Vägivaldne tegevus, mille eesmärk on külvata hirmu, terroriseerida inimesi või muuta poliitilisi, usulisi või sotsiaalseid olusid."}, {"q": "Totalitaarne diktatuur", "a": "Poliitiline süsteem, kus üks isik või üks partei omab absoluutset võimu ja kontrollib kõiki eluvaldkondi, sealhulgas meediat, haridust, majandust ja kodanike elu. Sellistes süsteemides puuduvad vabad valimised ja kodanikuvabadused, valitsev režiim kasutab sageli vägivalda, hirmutamist ja propagandat oma positsiooni säilitamiseks. (Stalin, Hitler)"}, {"q": "Trumani doktriin", "a": "1947 a. USA välispoliitiline algatus, mille eesmärk oli piirata kommunismi levikut pärast Teist maailmasõda. (majanduslikku ja sõjalist abi riikidele, nagu Türgi ja Kreeka)"}, {"q": "Tsensuur", "a": "Riiklik järelvalve raamatute ja ajalehtede (kogu meedia) üle; ükski väljaanne ei võinud trükki või esitlusele minna enne, kui vastavad ametnikud ehk tsensorid pole seda läbi vaadanud ja sobimatuid kohti kõrvaldanud."}, {"q": "Turumajandus", "a": "Majandussüsteem, kus kaupade ja teenuste hind ja tootmisotsused määratakse turu pakkumise ja nõudluse järgi. Selle süsteemi aluseks on eraomand, vabad turu­tehingud ja konkurents."}, {"q": "Vabariik", "a": "Riigivorm, mille puhul kõrgemad riigivõimuorganid on valitavad või need moodustab parlament."}, {"q": "Võidurelvastumine", "a": "Riikide kiire relvastuse kogumine ja arendamine, et üksteisele järele jõuda või üle olla, tavaliselt sõjalise üleoleku saavutamiseks."}, {"q": "ÜRO", "a": "Ühinenud Rahvaste Organisatsioon 1945.a moodustatud riikide ühendus, mille eesmärk on rahumeelse ja õiglase maailmakorralduse loomine ja rahvusvaheliste probleemide lahendamine."}, {"q": "Tartu rahu", "a": "2. veebruaril 1920 Eesti ja Nõukogude Venemaa vahel Tartus sõlmitud rahuleping, millega lõpetati Eesti Vabadussõda, määrati Eesti idapiir ning Nõukogude Venemaa tunnustas Eesti Vabariigi iseseisvust."}, {"q": "Baaside leping", "a": "Eesti Vabariigi ja Nõukogude Liidu vaheline vastastikuse abistamise pakt sõlmiti 28. septembril 1939. Lepingu kohaselt lubas Eesti Nõukogude Liidul rajada oma territooriumile sõjaväebaasid, mis andis Nõukogude Liidule õiguse paigutada oma sõjaväeüksused Eestisse. See samm tähendas Eesti suveräänsuse olulist piiramist ja oli eelkäijaks hilisemale Eesti okupeerimisele."}, {"q": "Küüditamine", "a": "inimeste sunniviisiline ümberasustamine, sageli massiliselt ja inimsusevastaste kuritegudena."}, {"q": "IME", "a": "26. septembril 1987 „Ettepanek: kogu Eesti NSV täielikule isemajandamisele“ ehk IME ettepanek. Selle kirjutise autorid olid Siim Kallas, Tiit Made, Edgar Savisaare ja Mikk Titma. Pakuti välja majandusprogrammi idee, kuidas Eesti NSV saavutaks majandusliku iseseisvuse Nõukogude Liidu koosseisus."}, {"q": "Suveräänsusdeklaratsioon", "a": "16. novembril 1988 ametlik dokument, millega riik kuulutab välja oma suveräänsuse, kinnitades oma kõrgeima võimu oma territooriumil ja kehtestades oma seaduste ülimuslikkuse."}, {"q": "Rahvasteliit", "a": "Pariisi rahukonverentsil asutati Rahvasteliit (1919) eesmärgiga säilitada rahu ja vältida tulevasi sõdu."}, {"q": "Suur Depressioon", "a": "Globaalne majanduskriis, mis algas 1929. aasta oktoobris New Yorgi börsikrahhiga ja kestis suurema osa 1930. aastatest. See oli 20. sajandi kõige laastavam majanduslangus, mis mõjutas peaaegu kõiki maailma riike, põhjustades massilist tööpuudust, pankade kokkuvarisemist ja üleilmset kaubanduse langust."}, {"q": "Fašism", "a": "Autoritaarne, äärmuslik ideoloogia, mis rõhutab tugevat riigivõimu, rahvuse ülemuslikkust, ühtekuuluvust ja sageli vägivalda poliitiliste vastaste vastu. Mussolini ja Hitler."}, {"q": "anšluss", "a": "Saksamaa liitumist Austriaga, mis toimus 1938. aasta märtsis. Adolf Hitler, Saksamaa diktaator, soovis taastada Saksamaa suuruse ja liideti Austriaga, mis oli olnud pärast Esimest maailmasõda sõltumatu riik."}, {"q": "Müncheni kokkulepe", "a": "1938. aasta septembris sõlmitud kokkulepe, mille tulemusena andsid Suurbritannia, Prantsusmaa, Saksamaa ja Itaalia Hitlerile loa okupeerida Tšehhoslovakkia osa – Sudetenlandi, kus elas suur saksa keelt kõnelev elanikkond."}, {"q": "Molotovi-Ribbentropi pakt", "a": "MRP ehk Saksa-Nõukogude liidu mitteagressioonipakt, oli kokkulepe, mille sõlmisid 23. augustil 1939 Saksamaa ja Nõukogude Liit. Paktis lepiti kokku, et mõlemad riigid ei ründa üksteist ega toeta vastase rünnakut. Pakt sisaldas ka salajast lisaprotokolli, milles lepiti kokku Ida-Euroopa jagamises."}, {"q": "Atlandi harta", "a": "14. augustil 1941 Suurbritannia peaministri Winston Churchilli ja Ameerika Ühendriikide president Franklin D. Roosevelti vaheline kokkulepe, mis kehtestas sõja ajal liitlaste ühised eesmärgid ja visioonid maailmasõja lõpus."}, {"q": "Holokaust", "a": "Teise maailmasõja ajal toimunud süsteemne ja riiklikult korraldatud massimõrv, mille käigus Natsi-Saksamaa ja selle liitlased hävitasid kuue miljoni juudi elu, samuti teisi vähemusi ja vähemkõlblike rühmi, nagu tsigaanid, vaimselt ja füüsiliselt puudega inimesed, homoseksuaalid, poliitilised vastased ja muud grupid, keda natsionaalsotsialistlik režiim pidas \"ebavajalikeks\" või \"madalamaks\"."}, {"q": "Varssavi Lepingu Organisatsioon", "a": "VLO ehk Varssavi Pakt oli Nõukogude Liidu ja Ida-Euroopa kommunistlike riikide sõjaline liit, mis loodi 1955. aastal vastukaaluks NATO-le."}, {"q": "Vastastikuse Majandusabi Nõukogu", "a": "VMN oli Nõukogude Liidu juhitud majandusorganisatsioon, mis loodi 1949. aastal Ida-Euroopa sotsialistlike riikide majanduskoostöö ja -integratsiooni edendamiseks."}, {"q": "Kosmosevõidukäik", "a": "(Space Race) oli Ameerika Ühendriikide ja Nõukogude Liidu vahelise Külma sõja ajal tekkinud võidujooks, mille eesmärgiks oli saavutada teaduslikke ja tehnoloogilisi läbimurdeid kosmosetehnoloogias."}, {"q": "Sputnik 1", "a": "NSVL saatis esimesena maailmas tehisalatiidi, Sputnik 1 (1957), orbiidile, mis tähistas esimest sammu kosmoses ja tõi esile Nõukogude tehnoloogilise üleoleku."}, {"q": "Juri Gagarin", "a": "Juri Gagarin sai esimeseks inimeseks, kes viis läbi kosmoselend (12.04.1961), mida peeti Nõukogude Liidu tohutuks eduks kosmosevõidukäigus."}, {"q": "Apollo 11", "a": "Ameerika Ühendriigid saavutasid suure võidu, kui astronaut Neil Armstrong astus kuu pinnale esmakordselt inimkonna ajaloos 1969. aastal missioonil Apollo 11. See sündmus tõi Ameerika Ühendriigid kosmosevõidujooksu liidriks."}, {"q": "patsifism", "a": "maailmavaade, mis eitab igasugust sõda"}, {"q": "reparatsioon", "a": "sõja võitnud riigile tekitatud kahju osaline või täielik hüvitamine sõja kaotanud riigi poolt"}, {"q": "agressor", "a": "sõjaalgataja ja vallutaja"}, {"q": "aktsia", "a": "väärtpaber"}, {"q": "börs", "a": "väärtpaberite hulgiturg"}, {"q": "enamlane", "a": "bolševik, kommunist Venemaal"},     let cards = [...allCards];
    let index = 0;
    let answerVisible = false;

    const qEl = document.getElementById("question");
    const aEl = document.getElementById("answer");
    const countEl = document.getElementById("count");
    const posEl = document.getElementById("position");
    const barEl = document.getElementById("bar");
    const searchEl = document.getElementById("search");
    const listEl = document.getElementById("list");

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function render() {
      if (!cards.length) {
        qEl.textContent = "Ühtegi kaarti ei leitud.";
        aEl.textContent = "";
        aEl.classList.remove("show");
        countEl.textContent = allCards.length;
        posEl.textContent = "0 / 0";
        barEl.style.width = "0%";
        return;
      }
      index = Math.max(0, Math.min(index, cards.length - 1));
      qEl.textContent = cards[index].q;
      aEl.textContent = cards[index].a;
      aEl.classList.toggle("show", answerVisible);
      document.getElementById("showBtn").textContent = answerVisible ? "Peida vastus" : "Näita vastust";
      countEl.textContent = cards.length;
      posEl.textContent = (index + 1) + " / " + cards.length;
      barEl.style.width = (((index + 1) / cards.length) * 100) + "%";
    }

    function toggleAnswer() { answerVisible = !answerVisible; render(); }
    function next() { if (!cards.length) return; index = (index + 1) % cards.length; answerVisible = false; render(); }
    function prev() { if (!cards.length) return; index = (index - 1 + cards.length) % cards.length; answerVisible = false; render(); }

    function shuffle() {
      for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      index = 0;
      answerVisible = false;
      render();
      renderList();
    }

    function reset() {
      cards = [...allCards];
      index = 0;
      answerVisible = false;
      searchEl.value = "";
      render();
      renderList();
    }

    function filterCards() {
      const term = searchEl.value.trim().toLowerCase();
      cards = allCards.filter(c =>
        c.q.toLowerCase().includes(term) || c.a.toLowerCase().includes(term)
      );
      index = 0;
      answerVisible = false;
      render();
      renderList();
    }

    function renderList() {
      if (!listEl.classList.contains("show")) return;
      listEl.innerHTML = cards.map((c, i) =>
        `<div class="row">
          <div class="num">${i + 1}</div>
          <div><strong>${escapeHtml(c.q)}</strong></div>
          <div>${escapeHtml(c.a)}</div>
        </div>`
      ).join("");
    }

    document.getElementById("showBtn").addEventListener("click", toggleAnswer);
    document.getElementById("nextBtn").addEventListener("click", next);
    document.getElementById("prevBtn").addEventListener("click", prev);
    document.getElementById("shuffleBtn").addEventListener("click", shuffle);
    document.getElementById("resetBtn").addEventListener("click", reset);
    searchEl.addEventListener("input", filterCards);

    document.getElementById("listBtn").addEventListener("click", () => {
      listEl.classList.toggle("show");
      document.getElementById("listBtn").textContent = listEl.classList.contains("show") ? "Peida nimekiri" : "Näita nimekirja";
      renderList();
    });

    document.addEventListener("keydown", (e) => {
      if (e.target.tagName === "INPUT") return;
      if (e.key === " ") { e.preventDefault(); toggleAnswer(); }
      if (e.key === "ArrowRight") next();
      if (e.key === "ArrowLeft") prev();
    });

    render();
  </script>
