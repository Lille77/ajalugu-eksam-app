<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ajaloo äpp PRO v4</title>
<style>
:root {--bg:#f4f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--primary:#1d4ed8;--border:#e5e7eb;--good:#dcfce7;--bad:#fee2e2;--warn:#fef3c7;}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:980px;margin:auto;padding:16px}
.card{background:var(--card);padding:16px;border-radius:16px;margin-bottom:14px;border:1px solid var(--border);box-shadow:0 4px 14px rgba(0,0,0,.05)}
h1{margin:0 0 8px;font-size:28px}
.small{color:var(--muted);font-size:14px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
button,select{padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;background:#fff;cursor:pointer}
.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.answer{display:block;width:100%;text-align:left;padding:12px;border-radius:10px;border:1px solid #d1d5db;background:#fff;cursor:pointer}
.answer.selected{outline:2px solid var(--primary);border-color:var(--primary)}
.answer.good{background:var(--good)}
.answer.bad{background:var(--bad)}
.answer.missed{background:var(--warn)}
.answers{display:grid;gap:8px;margin-top:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.stat{background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:12px}
.hidden{display:none}
.pill{display:inline-block;background:#eef2ff;color:#3730a3;padding:7px 10px;border-radius:999px;font-size:13px;font-weight:bold}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Ajaloo äpp PRO v4</h1>
    <div class="small">Rangem vastuseloogika ja päris multi-select. Kui Exceli lahtris on mitu õiget vastust, siis äpp loebki õigeks mitu vastust, mitte ühte.</div>
  </div>

  <div class="card">
    <div class="grid">
      <div class="stat"><strong>264</strong><div class="small">Exceli rida</div></div>
      <div class="stat"><strong>264</strong><div class="small">küsimust äpis</div></div>
      <div class="stat"><strong>149</strong><div class="small">ühe õige vastusega</div></div>
      <div class="stat"><strong>115</strong><div class="small">mitme õige vastusega</div></div>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <select id="mode">
        <option value="practice">Practice</option>
        <option value="exam">Exam (60 küsimust)</option>
        <option value="wrongonly">Ainult valed küsimused</option>
      </select>
      <button id="start" class="primary">Alusta</button>
      <span id="meta" class="small"></span>
    </div>
  </div>

  <div id="quiz" class="card hidden">
    <div class="row" style="justify-content:space-between">
      <div class="row">
        <strong id="counter"></strong>
        <span id="kind" class="pill"></span>
      </div>
      <div class="row">
        <span id="scoreLive" class="small"></span>
        <span id="timer" class="small"></span>
      </div>
    </div>
    <h2 id="question" style="font-size:22px;margin:14px 0 0"></h2>
    <div id="hint" class="small" style="margin-top:8px"></div>
    <div id="answers" class="answers"></div>
    <div id="explanation" class="small" style="margin-top:12px"></div>
    <div class="row" style="margin-top:14px">
      <button id="check" class="primary hidden">Kontrolli</button>
      <button id="next" class="primary hidden">Järgmine</button>
      <button id="finish" class="hidden">Lõpeta</button>
    </div>
  </div>

  <div id="result" class="card hidden"></div>
</div>

let current = [];
let idx = 0;
let score = 0;
let selected = new Set();
let checked = false;
let timerId = null;
let timeLeft = 50 * 60;
let wrongIds = JSON.parse(localStorage.getItem('history_wrong_ids_v4') || '[]');

const modeEl = document.getElementById('mode');
const startEl = document.getElementById('start');
const metaEl = document.getElementById('meta');
const quizEl = document.getElementById('quiz');
const resultEl = document.getElementById('result');
const counterEl = document.getElementById('counter');
const kindEl = document.getElementById('kind');
const scoreLiveEl = document.getElementById('scoreLive');
const timerEl = document.getElementById('timer');
const questionEl = document.getElementById('question');
const hintEl = document.getElementById('hint');
const answersEl = document.getElementById('answers');
const explanationEl = document.getElementById('explanation');
const checkEl = document.getElementById('check');
const nextEl = document.getElementById('next');
const finishEl = document.getElementById('finish');

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function fmt(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}
function getData() {
  const mode = modeEl.value;
  if (mode === 'exam') return shuffle(QUESTION_BANK).slice(0, Math.min(60, QUESTION_BANK.length));
  if (mode === 'wrongonly') {
    const wrongSet = new Set(wrongIds);
    return shuffle(QUESTION_BANK.filter(q => wrongSet.has(q.id)));
  }
  return shuffle(QUESTION_BANK);
}
function renderQuestion() {
  const q = current[idx];
  selected = new Set();
  checked = false;
  counterEl.textContent = (idx + 1) + '/' + current.length;
  kindEl.textContent = q.kind === 'multi' ? 'Mitu õiget vastust' : 'Üks õige vastus';
  scoreLiveEl.textContent = modeEl.value === 'exam' ? ('Punktid: ' + score) : '';
  questionEl.textContent = q.question;
  hintEl.textContent = q.kind === 'multi' ? 'Vali kõik õiged vastused ja vajuta Kontrolli.' : 'Vali üks vastus.';
  explanationEl.textContent = '';
  answersEl.innerHTML = '';
  nextEl.classList.add('hidden');
  finishEl.classList.add('hidden');
  checkEl.classList.toggle('hidden', q.kind !== 'multi');

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer';
    btn.textContent = String.fromCharCode(65 + i) + '. ' + opt;
    btn.onclick = () => handleSelect(i, btn);
    answersEl.appendChild(btn);
  });
}
function handleSelect(i, btn) {
  if (checked) return;
  const q = current[idx];
  if (q.kind === 'single') {
    selected = new Set([i]);
    gradeSingle();
  } else {
    if (selected.has(i)) {
      selected.delete(i);
      btn.classList.remove('selected');
    } else {
      selected.add(i);
      btn.classList.add('selected');
    }
  }
}
function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  const sa = [...a].sort((x,y)=>x-y);
  const sb = [...b].sort((x,y)=>x-y);
  return sa.every((v, i) => v === sb[i]);
}
function markWrong(id) {
  if (!wrongIds.includes(id)) {
    wrongIds.push(id);
    localStorage.setItem('history_wrong_ids_v4', JSON.stringify(wrongIds));
  }
}
function unmarkWrong(id) {
  wrongIds = wrongIds.filter(x => x !== id);
  localStorage.setItem('history_wrong_ids_v4', JSON.stringify(wrongIds));
}
function gradeSingle() {
  const q = current[idx];
  checked = true;
  const choice = [...selected][0];
  const correct = q.correctIndexes[0];
  const btns = [...answersEl.children];
  btns.forEach((b, i) => {
    if (i === correct) b.classList.add('good');
    if (i === choice && i !== correct) b.classList.add('bad');
  });
  if (choice === correct) {
    score++;
    unmarkWrong(q.id);
  } else {
    markWrong(q.id);
  }
  explanationEl.textContent = 'Õige vastus: ' + q.correctAnswers.join('; ');
  if (idx < current.length - 1) nextEl.classList.remove('hidden');
  else finishEl.classList.remove('hidden');
}
function gradeMulti() {
  const q = current[idx];
  checked = true;
  const chosen = [...selected];
  const btns = [...answersEl.children];
  btns.forEach((b, i) => {
    const isCorrect = q.correctIndexes.includes(i);
    const wasChosen = selected.has(i);
    if (isCorrect && wasChosen) b.classList.add('good');
    if (!isCorrect && wasChosen) b.classList.add('bad');
    if (isCorrect && !wasChosen) b.classList.add('missed');
  });
  if (arraysEqual(chosen, q.correctIndexes)) {
    score++;
    unmarkWrong(q.id);
  } else {
    markWrong(q.id);
  }
  explanationEl.textContent = 'Õiged vastused: ' + q.correctAnswers.join('; ');
  if (idx < current.length - 1) nextEl.classList.remove('hidden');
  else finishEl.classList.remove('hidden');
}
function finishQuiz() {
  clearInterval(timerId);
  const percent = current.length ? Math.round((score / current.length) * 100) : 0;
  resultEl.classList.remove('hidden');
  resultEl.innerHTML =
    '<h3 style="margin-top:0">Tulemus</h3>' +
    '<p><strong>' + score + '/' + current.length + '</strong> (' + percent + '%)</p>' +
    '<p class="small">Valede küsimuste režiim kasutab brauserisse salvestatud eksitud küsimusi.</p>';
}
function startQuiz() {
  clearInterval(timerId);
  current = getData();
  idx = 0;
  score = 0;
  resultEl.classList.add('hidden');
  quizEl.classList.remove('hidden');
  metaEl.textContent = current.length + ' küsimust';
  if (!current.length) {
    questionEl.textContent = 'Siin pole veel küsimusi.';
    answersEl.innerHTML = '';
    hintEl.textContent = '';
    explanationEl.textContent = '';
    checkEl.classList.add('hidden');
    nextEl.classList.add('hidden');
    finishEl.classList.add('hidden');
    return;
  }
  if (modeEl.value === 'exam') {
    timeLeft = 50 * 60;
    timerEl.textContent = 'Aeg: ' + fmt(timeLeft);
    timerId = setInterval(() => {
      timeLeft--;
      timerEl.textContent = 'Aeg: ' + fmt(timeLeft);
      if (timeLeft <= 0) finishQuiz();
    }, 1000);
  } else {
    timerEl.textContent = 'Aeg: —';
  }
  renderQuestion();
}
checkEl.onclick = gradeMulti;
nextEl.onclick = () => {
  idx++;
  if (idx < current.length) renderQuestion();
};
finishEl.onclick = finishQuiz;
startEl.onclick = startQuiz;
metaEl.textContent = QUESTION_BANK.length + ' küsimust valmis';
</script>
