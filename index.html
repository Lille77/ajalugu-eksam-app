const questionBank = data.questions;
const topicAnswers = data.topicAnswers;
const allAnswers = data.allAnswers;

const topic = document.getElementById('topic');
const mode = document.getElementById('mode');
const start = document.getElementById('start');
const quiz = document.getElementById('quiz');
const result = document.getElementById('result');
const qEl = document.getElementById('question');
const aEl = document.getElementById('answers');
const expEl = document.getElementById('explanation');
const counter = document.getElementById('counter');
const scoreLive = document.getElementById('scoreLive');
const nextBtn = document.getElementById('next');
const finishBtn = document.getElementById('finish');
const meta = document.getElementById('meta');
const timerEl = document.getElementById('timer');

let current = [], i = 0, score = 0, answered = false, timeLeft = 50*60, timerId = null;

function uniqTopics() {
  return ['Kõik', ...new Set(questionBank.map(x => x.topic))];
}
function shuffle(arr) {
  const a = [...arr];
  for (let j = a.length - 1; j > 0; j--) {
    const k = Math.floor(Math.random() * (j + 1));
    [a[j], a[k]] = [a[k], a[j]];
  }
  return a;
}
function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}
function setTopics() {
  uniqTopics().forEach(t => {
    const o = document.createElement('option');
    o.value = t;
    o.textContent = t;
    topic.appendChild(o);
  });
}
function pickDistractors(q) {
  const sameTopic = (topicAnswers[q.topic] || []).filter(x => x !== q.correct);
  const globalPool = allAnswers.filter(x => x !== q.correct && !sameTopic.includes(x));
  let pool = shuffle(sameTopic).slice(0, 6);
  if (pool.length < 3) pool = pool.concat(shuffle(globalPool).slice(0, 3 - pool.length));
  const distractors = shuffle(pool).slice(0, 3);
  let opts = [q.correct, ...distractors];
  opts = shuffle(opts);
  return { options: opts, answer: opts.indexOf(q.correct) };
}
function prepareQuestions(list) {
  return list.map(q => {
    const built = pickDistractors(q);
    return {
      topic: q.topic,
      q: q.q,
      options: built.options,
      answer: built.answer,
      explanation: q.correct
    };
  });
}
function getData() {
  const base = topic.value === 'Kõik' ? questionBank : questionBank.filter(x => x.topic === topic.value);
  const picked = mode.value === 'exam' ? shuffle(base).slice(0, Math.min(60, base.length)) : shuffle(base);
  return prepareQuestions(picked);
}
function renderQuestion() {
  const q = current[i];
  answered = false;
  qEl.textContent = q.q;
  counter.textContent = (i + 1) + '/' + current.length;
  scoreLive.textContent = mode.value === 'exam' ? ('Õigeid praegu: ' + score) : '';
  expEl.textContent = '';
  aEl.innerHTML = '';
  nextBtn.classList.add('hidden');
  finishBtn.classList.add('hidden');

  q.options.forEach((opt, idx) => {
    const b = document.createElement('button');
    b.className = 'answer answer-btn';
    b.textContent = String.fromCharCode(65 + idx) + '. ' + opt;
    b.onclick = () => choose(idx, b);
    aEl.appendChild(b);
  });
}
function choose(idx, btn) {
  if (answered) return;
  answered = true;
  const q = current[i];
  [...aEl.children].forEach(x => x.classList.remove('good','bad'));
  if (idx === q.answer) {
    btn.classList.add('good');
    score++;
  } else {
    btn.classList.add('bad');
    aEl.children[q.answer].classList.add('good');
  }
  expEl.textContent = 'Õige vastus: ' + q.explanation;
  if (i < current.length - 1) nextBtn.classList.remove('hidden');
  else finishBtn.classList.remove('hidden');
}
function startQuiz() {
  clearInterval(timerId);
  current = getData();
  i = 0;
  score = 0;
  result.classList.add('hidden');
  quiz.classList.remove('hidden');
  meta.textContent = current.length + ' küsimust';
  if (mode.value === 'exam') {
    timeLeft = 50 * 60;
    timerEl.textContent = 'Aeg: ' + fmt(timeLeft);
    timerId = setInterval(() => {
      timeLeft--;
      timerEl.textContent = 'Aeg: ' + fmt(timeLeft);
      if (timeLeft <= 0) finishQuiz();
    }, 1000);
  } else {
    timerEl.textContent = 'Aeg: —';
  }
  renderQuestion();
}
function finishQuiz() {
  clearInterval(timerId);
  const percent = Math.round((score / current.length) * 100);
  result.classList.remove('hidden');
  result.innerHTML = '<strong>Tulemus:</strong> ' + score + '/' + current.length + ' (' + percent + '%)';
}
nextBtn.onclick = () => {
  i++;
  if (i < current.length) renderQuestion();
};
finishBtn.onclick = finishQuiz;
start.onclick = startQuiz;

setTopics();
meta.textContent = questionBank.length + ' küsimust pangas';
</script>
