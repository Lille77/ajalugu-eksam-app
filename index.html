<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ajaloo äpp FIX</title>
<style>
body{font-family:Arial;margin:0;background:#f4f7fb}
.wrap{max-width:900px;margin:auto;padding:16px}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:12px}
button,select{padding:10px;border-radius:8px;border:1px solid #ccc}
.primary{background:#1d4ed8;color:#fff}
.answers{margin-top:10px;display:grid;gap:8px}
.good{background:#dcfce7}
.bad{background:#fee2e2}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<h2>Ajaloo äpp (FIX)</h2>
<select id="mode">
<option value="practice">Practice</option>
<option value="exam">Exam</option>
</select>
<button id="start" class="primary">Alusta</button>
</div>

<div id="quiz" class="card" style="display:none">
<h3 id="q"></h3>
<div id="a" class="answers"></div>
<p id="exp"></p>
<button id="next" class="primary" style="display:none">Järgmine</button>
</div>
</div>

<script>
const data=[
{q:'Mis aastatel toimus Vabadussõda?',o:['1917–1919','1918–1920','1919–1921'],a:1,e:'1918–1920'},
{q:'Mis on kolhoos?',o:['ühismajand','valuuta','partei'],a:0,e:'ühismajand'},
{q:'Mis on perestroika?',o:['reform','sõda','valuuta'],a:0,e:'reform'},
{q:'Millal taastati Eesti iseseisvus?',o:['1989','1991','1920'],a:1,e:'1991'},
{q:'Mis oli Normandia dessant?',o:['maabumine','pommitamine','rahuleping'],a:0,e:'maabumine'},
{q:'Mis on külm sõda?',o:['kaudne konflikt','kuum sõda','rahuleping'],a:0,e:'kaudne konflikt'}
];

let current=[],i=0;

function shuffle(arr){
let a=[...arr];
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

function start(){
current=shuffle(data).map(q=>{
let pairs=q.o.map((x,i)=>({x,correct:i===q.a}));
pairs=shuffle(pairs);
return{
q:q.q,
o:pairs.map(p=>p.x),
a:pairs.findIndex(p=>p.correct),
e:q.e
}
});
i=0;
document.getElementById('quiz').style.display='block';
render();
}

function render(){
let q=current[i];
document.getElementById('q').innerText=q.q;
let aDiv=document.getElementById('a');
aDiv.innerHTML='';
document.getElementById('exp').innerText='';
document.getElementById('next').style.display='none';

q.o.forEach((opt,idx)=>{
let b=document.createElement('button');
b.innerText=opt;
b.onclick=()=>{
[...aDiv.children].forEach(x=>x.classList.remove('good','bad'));
if(idx===q.a){b.classList.add('good')}
else{b.classList.add('bad')}
aDiv.children[q.a].classList.add('good');
document.getElementById('exp').innerText=q.e;
document.getElementById('next').style.display='block';
};
aDiv.appendChild(b);
});
}

document.getElementById('next').onclick=()=>{
i++;
if(i>=current.length){
alert('Valmis!');
location.reload();
}
render();
};

document.getElementById('start').onclick=start;
</script>
</body>
</html>
